apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cloud-importer-rhelai-gcp
  labels:
    app.kubernetes.io/version: "0.0.4"
  annotations:
    tekton.dev/pipelines.minVersion: "0.44.x"
    tekton.dev/categories: infrastructure
    tekton.dev/tags: infrastructure, gcp, rhelai
    tekton.dev/displayName: "CloudImporter RHEL-AI GCP"
    tekton.dev/platforms: "linux/amd64"
spec:
  description: >-
    This Task imports a RAW image to GCP using the cloud-importer tool.
  params:
    # general
    - name: debug
      description: run with deug logs
    - name: id
      description: identifier for the taskrun
    - name: operation
      description: operation to perform (create or destroy)
      default: create
    - name: secret-gcp-credentials
      description: |
        K8S secret holding the GCP credentials. Secret should be accessible to this task.

        ---
        apiVersion: v1
        kind: Secret
        metadata:
          name: gcp-${name}
        type: Opaque
        data:
          bucket: ${bucket}
          credentials: ${credentials}
          project: ${project}
          region: ${region}

    # uploading of images
    - name: image-name
      description: The name of the image to be created.
      default: ""
    - name: image-path
      description: Local path to the raw image.
      default: ""
    - name: replicate
      description: "A comma-separated list of regions to replicate the image to."
      default: "all"
    - name: share-orgs-ids
      description: "A comma-separated list of organization tenant IDs to share the image with."
      default: ""
    - name: tags
      description: "A comma-separated list of tags to add to the image."
      default: ""

    # removal of images
    - name: force-destroy
      description: destroy even if there is a lock
      default: "false"
    - name: keep-state
      description: keep the Pulumi state in the GCS backend after successful destroy
      default: "false"
  workspaces:
    - name: data
      description: A workspace for the raw image.
      mountPath: /data
      optional: true
  steps:
    - name: run-cloud-importer
      image: quay.io/aipcc-cicd/cloud-importer:v0.0.4
      script: |
        #!/bin/sh

        set -euo pipefail

        # Function to mask credentials (show first and last char, hide middle)
        mask_credential() {
          local cred="$1"
          local len=${#cred}
          if [ $len -le 2 ]; then
            echo "***"
          else
            echo "${cred:0:1}***${cred: -1}"
          fi
        }

        # Credentials - set these BEFORE enabling debug mode
        BUCKET=$(cat /opt/gcp-credentials/bucket)
        export GOOGLE_CREDENTIALS=$(cat /opt/gcp-credentials/credentials)
        export GOOGLE_PROJECT=$(cat /opt/gcp-credentials/project)
        export GOOGLE_REGION=$(cat /opt/gcp-credentials/region)

        # If debug add verbosity and print masked credentials
        if [[ "$(params.debug)" == "true" ]]; then
          echo "BUCKET"=$BUCKET
          echo "GOOGLE_CREDENTIALS=$(mask_credential "$GOOGLE_CREDENTIALS")"
          echo "GOOGLE_PROJECT=$(mask_credential "$GOOGLE_PROJECT")"
          echo "GOOGLE_REGION=$GOOGLE_REGION"
          set -xeuo pipefail
        fi

        cmd="cloud-importer "
        if [[ "$(params.operation)" == "create" ]]; then
          if [[ "$(workspaces.data.bound)" != "true" ]]; then
            echo "ERROR: workspace 'data' must be bound for create operation"
            exit 1
          fi
          cmd+="rhelai gcp "
          cmd+="--image-path /data/$(params.image-path) "
          cmd+="--image-name $(params.image-name) "

          if [ -n "$(params.share-orgs-ids)" ]; then
            cmd+="--share-orgs-ids=$(params.share-orgs-ids) "
          fi

          if [ -n "$(params.replicate)" ]; then
            cmd+="--replicate=$(params.replicate) "
          fi

          if [ -n "$(params.tags)" ]; then
            cmd+="--tags=$(params.tags) "
          fi
        else
          cmd+="destroy "

          if [[ "$(params.force-destroy)" == "true" ]]; then
            cmd+="--force-destroy "
          fi

          if [[ "$(params.keep-state)" == "true" ]]; then
            cmd+="--keep-state "
          fi
        fi

        cmd+="--project-name $(params.id) "
        cmd+="--backed-url gs://${BUCKET}/cloud-importer "

        if [[ "$(params.debug)" == "true" ]]; then
          cmd+="--debug "
        fi

        eval ${cmd}

      volumeMounts:
        - name: gcp-credentials
          mountPath: /opt/gcp-credentials
  volumes:
    - name: gcp-credentials
      secret:
        secretName: $(params.secret-gcp-credentials)
