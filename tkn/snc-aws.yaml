apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cloud-importer-openshift-local-aws
  labels:
    app.kubernetes.io/version: "0.0.4"
  annotations:
    tekton.dev/pipelines.minVersion: "0.44.x"
    tekton.dev/categories: infrastructure
    tekton.dev/tags: infrastructure, aws, crc-bundle
    tekton.dev/displayName: "CloudImporter OpenShift-Local AWS"
    tekton.dev/platforms: "linux/amd64"
spec:
  description: >-
    This Task imports an OpenShift Local bundle to AWS using the cloud-importer tool.
  params:
    # general
    - name: debug
      description: run with deug logs
    - name: id
      description: identifier for the taskrun
    - name: operation
      description: operation to perform (create or destroy)
      default: create
    - name: secret-aws-credentials
      description: |
        K8S secret holding the AWS credentials. Secret should be accessible to this task.

        ---
        apiVersion: v1
        kind: Secret
        metadata:
          name: aws-${name}
        type: Opaque
        data:
          access-key: ${access_key}
          secret-key: ${secret_key}
          region: ${region}
          bucket: ${bucket}

    # uploading of images
    - name: arch
      description: Architecture for the machine (x86_64 or arm64).
      default: "x86_64"
    - name: bundle-uri
      description: Accessible URL to get the bundle.
      default: ""
    - name: replicate
      description: "A comma-separated list of regions to replicate the image to."
      default: "all"
    - name: share-orgs-ids
      description: "A comma-separated list of organization ARNs to share the image with."
      default: ""
    - name: shasum-uri
      description: Accessible URL to get the shasum file to check bundle.
      default: ""
    - name: tags
      description: "A comma-separated list of tags to add to the image."
      default: ""

    # removal of images
    - name: force-destroy
      description: destroy even if there is a lock
      default: "false"
    - name: keep-state
      description: keep the Pulumi state in the S3 backend after successful destroy
      default: "false"
  steps:
    - name: run-cloud-importer
      image: quay.io/aipcc-cicd/cloud-importer:v0.0.4
      script: |
        #!/bin/sh

        set -euo pipefail

        # Function to mask credentials (show first and last char, hide middle)
        mask_credential() {
          local cred="$1"
          local len=${#cred}
          if [ $len -le 2 ]; then
            echo "***"
          else
            echo "${cred:0:1}***${cred: -1}"
          fi
        }

        # Credentials - set these BEFORE enabling debug mode
        export AWS_ACCESS_KEY_ID=$(cat /opt/aws-credentials/access-key)
        export AWS_SECRET_ACCESS_KEY=$(cat /opt/aws-credentials/secret-key)
        export AWS_DEFAULT_REGION=$(cat /opt/aws-credentials/region)
        BUCKET=$(cat /opt/aws-credentials/bucket)

        # If debug add verbosity and print masked credentials
        if [[ "$(params.debug)" == "true" ]]; then
          echo "AWS_ACCESS_KEY_ID=$(mask_credential "$AWS_ACCESS_KEY_ID")"
          echo "AWS_SECRET_ACCESS_KEY=$(mask_credential "$AWS_SECRET_ACCESS_KEY")"
          echo "AWS_DEFAULT_REGION=$AWS_DEFAULT_REGION"
          echo "BUCKET"=$BUCKET
          set -xeuo pipefail
        fi

        cmd="cloud-importer "
        if [[ "$(params.operation)" == "create" ]]; then
          cmd+="snc aws "
          cmd+="--arch $(params.arch) "
          cmd+="--bundle-uri \"$(params.bundle-uri)\" --shasum-uri \"$(params.shasum-uri)\" "

          if [ -n "$(params.share-orgs-ids)" ]; then
            cmd+="--share-orgs-ids=$(params.share-orgs-ids) "
          fi

          if [ -n "$(params.replicate)" ]; then
            cmd+="--replicate=$(params.replicate) "
          fi

          if [ -n "$(params.tags)" ]; then
            cmd+="--tags=$(params.tags) "
          fi
        else
          cmd+="destroy "

          if [[ "$(params.force-destroy)" == "true" ]]; then
            cmd+="--force-destroy "
          fi

          if [[ "$(params.keep-state)" == "true" ]]; then
            cmd+="--keep-state "
          fi
        fi

        cmd+="--project-name $(params.id) "
        cmd+="--backed-url s3://${BUCKET}/cloud-importer "

        if [[ "$(params.debug)" == "true" ]]; then
          cmd+="--debug "
        fi

        eval ${cmd}

      volumeMounts:
        - name: aws-credentials
          mountPath: /opt/aws-credentials
  volumes:
    - name: aws-credentials
      secret:
        secretName: $(params.secret-aws-credentials)