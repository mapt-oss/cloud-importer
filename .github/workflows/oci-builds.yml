name: oci-builds

on:
  push:
    branches: [ 'main' ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ 'main' ]

jobs:
  build-and-upload:
    name: Build and Upload Images
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    steps:
      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - name: Install Podman (only for arm64)
        if: contains(matrix.os, 'arm')
        run: |
          sudo apt-get update -y
          sudo apt-get -y install podman
      - name: Set environment variables based on architecture
        run: |
          if [[ "${{ matrix.os }}" == *"arm"* ]]; then
            echo "ARCH_TYPE=arm64" >> $GITHUB_ENV
          else
            echo "ARCH_TYPE=amd64" >> $GITHUB_ENV
          fi
      - name: Validate version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION=${GITHUB_REF_NAME#v}
          MAKEFILE_VERSION=$(grep -m1 '^VERSION' Makefile | sed 's/.*?= *//')
          if [[ "$TAG_VERSION" != "$MAKEFILE_VERSION" ]]; then
            echo "Tag v${TAG_VERSION} does not match Makefile VERSION ${MAKEFILE_VERSION}"
            exit 1
          fi
      # IMG is derived here so that smoke tests and artifact uploads
      # reference the correct image name. For PRs the image goes to ghcr;
      # for main/tag pushes it is resolved from the Makefile VERSION.
      - name: Set image name
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "IMG=ghcr.io/mapt-oss/cloud-importer:pr-${{ github.event.number }}" >> $GITHUB_ENV
          else
            VERSION=$(grep -m1 '^VERSION' Makefile | sed 's/.*?= *//')
            echo "IMG=quay.io/aipcc-cicd/cloud-importer:v${VERSION}" >> $GITHUB_ENV
          fi
      - name: Build image
        shell: bash
        run: |
          make oci-build-${{ env.ARCH_TYPE }}
          make oci-save-${{ env.ARCH_TYPE }}
      - name: Smoke test image
        run: |
          podman run --rm ${IMG}-${{ env.ARCH_TYPE }} --help
          podman run --rm --entrypoint sh ${IMG}-${{ env.ARCH_TYPE }} -c "pulumi plugin ls | grep -E 'aws |azure-native |gcp |command '"
      - name: Upload cloud-importer image as artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: cloud-importer-${{ env.ARCH_TYPE }}
          path: cloud-importer*
  combine-artifacts:
    name: Combine Artifacts
    needs: build-and-upload
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - name: Download cloud-importer oci flatten images
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          pattern: cloud-importer-*
      - name: copy both artifacts into single directory
        env:
          IMG: ghcr.io/mapt-oss/cloud-importer:pr-${{ github.event.number }}
        run: echo ${IMG} > cloud-importer-image
      - name: Upload combined mapt artifacts for PR
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: cloud-importer-arm64-and-amd64
          path: cloud-importer-*
  push:
    name: Push
    if: github.event_name == 'push'
    needs: build-and-upload
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Download cloud-importer oci flatten images
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          pattern: cloud-importer-*

      - name: Log in to quay.io
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603 # v1.7
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Push image
        shell: bash
        run: |
          make oci-load
          make oci-push
  release:
    name: Release
    needs: push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Set version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
      - name: Log in to quay.io
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603 # v1.7
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - name: Tag as latest on Quay
        run: |
          skopeo copy -a \
            docker://quay.io/aipcc-cicd/cloud-importer:v${{ env.VERSION }} \
            docker://quay.io/aipcc-cicd/cloud-importer:latest
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v${{ env.VERSION }} --title "Release v${{ env.VERSION }}" --generate-notes
